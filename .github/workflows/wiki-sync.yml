name: Sync Wiki

on:
  push:
    paths: [ 'wiki/**' ]
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
          strategy: sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
